name: AgentDeck
options:
  bundleIdPrefix: com.ritivel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO

targets:
  AgentDeck:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AgentDeck
    info:
      path: AgentDeck/Info.plist
      properties:
        CFBundleDisplayName: AgentDeck
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSLocalNetworkUsageDescription: "AgentDeck discovers and connects to your Mac's AgentDeck bridge on the local network to control your coding agents."
        NSBonjourServices:
          - "_agentdeck._tcp"
        NSCameraUsageDescription: "AgentDeck uses the camera to scan the pairing QR code shown by the bridge."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ritivel.agentdeck
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
