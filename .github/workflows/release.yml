name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bridge/package-lock.json

      - name: Build bridge npm package
        working-directory: bridge
        run: |
          npm ci
          npm run build
          npm pack
          mv agentdeck-bridge-*.tgz ../agentdeck-bridge.tgz

      - name: Run bridge tests
        working-directory: bridge
        run: npx tsx test/live.mjs

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build Mac app
        working-directory: ios
        run: |
          set -o pipefail
          xcodegen generate
          xcodebuild -project AgentDeck.xcodeproj -scheme AgentDeckMac \
            -configuration Release -destination 'platform=macOS' \
            -derivedDataPath DerivedData build | tail -30

      - name: Zip Mac app
        run: |
          ditto -c -k --keepParent \
            ios/DerivedData/Build/Products/Release/AgentDeckMac.app \
            AgentDeck-mac.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            AgentDeck-mac.zip
            agentdeck-bridge.tgz
